services:
  postgres:
    image: postgres:17-alpine
    container_name: vejr-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: vejr
      POSTGRES_PASSWORD: vejr
      POSTGRES_DB: vejr

    ports:
      - "5432:5432"

    volumes:
      - vejr_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vejr -d vejr"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vejr_postgres_data: